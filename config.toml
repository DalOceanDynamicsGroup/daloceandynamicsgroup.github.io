[params]
  description = "Website of Dalhousie Ocean Dynamics Group"
  author = ""
  email = "rmusgrave@dal.ca"
  address = "Dalhousie University, Halifax NS, Canada"

  slogan = "Dalhousie Ocean Dynamics Group"
  slogan_text = "<em>How inappropriate to call this planet Earth, when it is quite clearly Ocean</em><br>Arthur C Clark"

  [[params.slogan_columns]]
    # title = "About"
    text =  "We study the processes that generate turbulence and mixing in the ocean, and their broader impacts across the global ocean system. As a result, our research encompasses a wide range of phenomena, including internal waves, wind forced currents and buoyant plumes. We make direct measurements of turbulence, often close to home in Bedford Basin and on the Scotian Shelf, but also further afield, in places that have included Japan and the Labrador Sea. We use numerical models at a range of complexities to help interpret our measurements, from simple box models to idealized simulations and complex biogeochemical regional-scale models that can run on multiple CPUs or GPUs. Underlying everything is a desire to better understand and predict the ocean, informing decisions relating to human interactions with this critial component of our climate."
    #link = "/projects/"
    # link = "/#projects"	
    # link_text = "Read about some of our work here"
    weight = 1
  
