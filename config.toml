publishdir = "public"
static = "/static"
builddrafts = false
# Replace this with your website URL
baseurl = "https://daloceandynamicsgroup.github.io"
canonifyurls = true
theme = "hugo-academic-group"
title = "Dalhousie Ocean Dynamics Group (DODG)"
math = true
copyright = "&copy; DODG, 2026"

[taxonomies]
category = "categories"
tag = "tags"


[params]
  description = "Website of Dalhousie Ocean Dynamics Group"
  author = ""
  email = "rmusgrave@dal.ca"
  address = "Dalhousie University, Halifax NS, Canada"

  slogan = "Dalhousie Ocean Dynamics Group"
  slogan_text = ""

  [[params.slogan_columns]]
    title = "About"
    text =  "Ocean researchers with interests in how physics interacts with ocean biogeochemistry"
    link = "/about"
    link_text = "Meet the team"
    weight = 1
  
  [[params.slogan_columns]]
    title = "Mission"
    text =  "*How inappropriate to call this planet Earth, when it is quite clearly Ocean* -- Arthur C Clark"
    link = "/mission"
    link_text = "Read more"
    weight = 2

  [[params.slogan_columns]]
    title = "Approach"
    text = "Ocean measurements and numerical modeling across a range of complexities"
    link = "/approach"
    link_text = "Read more"
    weight = 3

  # Selected Publications section.
  [params.publications_selected]
    detailed_list = true
    title = "Selected Publications"
    subtitle = ""

  # Publications section.
  # Section will only be displayed if there are publications in `content/publication/`.
  [params.publications]
    count = 5
    detailed_list = false
    title = "Publications"
    subtitle = ""
    str_all = "More Publications"

  # Posts section.
  # Section will only be displayed if there are posts in `content/post/`.
  [params.posts]
    count = 2
    title = "Blog"
    subtitle = ""
    str_all = "More Posts"
    str_read_more = "Read more"

  # Projects section.
  # Section will only be displayed if there are projects in `content/project/`.
  [params.projects]
    title = "Projects"
    subtitle = ""
    count = 3
    str_all = "More Projects"
  
  # Vacancies section
  # Section will only be displayed if there are valid vacancies in `content/vacancy`
  [params.vacancies]
    title = "Vacancies"
    subtitle = ""
    count = 3
    str_all = "More Vacancies"

  # Contact section.
  [params.contact]
    enable = true
    title = "Contact"
    subtitle = ""
    autolink = false  # Automatically link email and phone?

  # Navigation Links
  #   The weight parameter defines the order that the links will appear in.

  [[menu.main]]
      name = "Home"
      url = "/#top"
      weight = 1

  [[menu.main]]
      name = "About"
      url = "/about"
      weight = 2

[[menu.main]]
      name = "Research"
      url = "/research"
      weight = 3

  [[menu.main]]
      name = "Publications"
      url = "/#publications"
      weight = 4

    [[menu.main]]
      name = "Projects"
      url = "/#projects"
      weight = 5

  [[menu.main]]
      name = "Members"
      url = "/#members"
      weight = 6

  [[menu.main]]
      name = "Blog"
      url = "/#posts"
      weight = 7


  [[menu.main]]
      name = "Contact"
      url = "/#contact"
      weight = 8
